</head>
<body>
    <div class="container text-center">
  <div class="row">

      6 of 12

    <div class="col p-3 text-primary-emphasis bg-secondary-subtle border border-primary-subtle rounded-3">

  <div class="row">
    <div class="col p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">

    </div>
    <div class="col p-3 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">

<div class="container text-center">
  <div class="row">
    <div class="col bg-danger">col</div>
    <div class="col bg-danger">col</div>
    <div class="col bg-danger">col</div>
    <div class="col bg-danger">col</div>
  </div>
  <div class="row">
    <div class="col-8 bg-success">col-8</div>
    <div class="col-4 bg-warning" >col-4</div>
  </div><br>






  <div class="container text-center">
  <!-- Stack the columns on mobile by making one full-width and the other half-width -->
  <div class="row">
    <div class="col-md-8 p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">.col-md-8</div>
    <div class="col-8 col-md-4 p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">.col-6 .col-md-4</div>
  </div>

  <!-- Columns start at 50% wide on mobile and bump up to 33.3% wide on desktop -->
  <div class="row">
    <div class="col-4 col-md-4 p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">.col-6 .col-md-4</div>
    <div class="col-4 col-md-4 p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">.col-6 .col-md-4</div>
    <div class="col-4 col-md-4 p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">.col-6 .col-md-4</div>
  </div>

  <!-- Columns are always 50% wide, on mobile and desktop -->
  <div class="row">
    <div class="col-4 p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">.col-6</div>
    <div class="col-8 p-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3">.col-6</div>
  </div>
</div>
</div>
</body>
</html>
