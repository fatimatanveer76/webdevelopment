<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-section{
            background-color: aquamarine;
            height:500px;
            padding: 20px 10px;
        }
        .grid-container{
            display:grid;
            height:500px;
            /* background-color: aliceblue; */
        
            /* aligns the item inside the container */
            justify-content: center;
            align-content:center;
            /* aligns the grid inside its cell */
            /* justify-items: center;
            align-items: center; */

            gap: 2px 7px;
        }
        .grid-container .items{
            background-color: bisque;
            padding:10px;
        }
        .item1{
            grid-row:1/3;
            grid-column:1/3;
        }
        .item2{
            grid-row:1/2;
        }
        /*  */
    </style>
</head>
<body>
    <!-- grid -->
     <section class="grid-section">
        <div class="grid-container">
            <div class="items item1" >item1</div>
            <div class="items item2" >item2</div>
            <div class="items item3">item3</div>
            <div class="items item4">item4</div>
            <div class="items item5">item5</div>
            <div class="items item6">item6</div>
            <div class="items item7">item7</div>
