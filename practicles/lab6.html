<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>positions</title>
    <style>
        #box1{
            background-color: black;
            width:300px;
            height:300px;
            position:relative;
        }
        #box2{
            background-color:crimson;
            width:50px;
            height:50px;
            position:absolute;
            top:10px;
            left:0;
        }
        #box3{
            background-color:crimson;
            width:50px;
            height:50px;
            position:absolute;
            top:10px;
            right:0;
        }
        #box4{
            background-color:crimson;
            width:50px;
            height:50px;
            position:absolute;
            bottom:10px;
            left:0;
        }
        #box5{
            background-color:crimson;
            width:50px;
            height:50px;
            position:absolute;
            bottom:10px;
            right:0;
        }
       #box6{
            background-color:crimson;
            width:50px;
            height:50px;
            top:120px;
            left:115px;
            position:absolute;
           
        }
    </style>
</head>
<body>
    <div id="box1">
        <div id="box2"></div>
        <div id="box3"></div>
        <div id="box4"></div>
        <div id="box5"></div>
         <div id="box6"></div>


    </div>
    
</body>
</html>
